<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文天玩WenTianPlay品牌产品</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="cursor"></div>
    
    <header>
        <div id="stars-container">
            <div id="stars"></div>
            <div id="stars2"></div>
            <div id="stars3"></div>
            <div class="clouds">
                <div class="cloud cloud1"></div>
                <div class="cloud cloud2"></div>
                <div class="cloud cloud3"></div>
                <div class="cloud cloud4"></div>
                <div class="cloud cloud5"></div>
                <div class="cloud cloud6"></div>
            </div>
            <div id="meteors-container"></div>
        </div>
        
        <div class="header-content">
            <div class="text-scramble">
                <h1>我们的<span class="scramble-text" data-text="团队">团队</span></h1>
            </div>
            <p class="typing-text">专业、创新、热情，共同创造价值</p>
        </div>
    </header>

    <section class="team-intro">
        <div class="container">
            <h2>我们是谁</h2>
            <div class="intro-content">
                <div class="intro-text">
                    <p>文天玩WenTianPlay创立于2024年，我们是一个年轻且充满活力的初创团队，</p>
                    <p>致力于二次元ACG文化在各个领域的深度探索，对一切新鲜事物充满热忱，不断追求进步与创新。</p>
                </div>
                <div class="intro-stats">
                    <div class="stat">
                        <span class="stat-number" data-count="2024">0</span>
                        <span class="stat-label">正式立项</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number" data-count="2028">0</span>
                        <span class="stat-label">成立时间</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number" data-count="1000000">0</span>
                        <span class="stat-label">注册资本</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="team-members">
        <div class="container">
            <h2>关于我们</h2>
            <div class="filter-controls">
                <button class="filter-btn" data-filter="op">股东</button>
                <button class="filter-btn" data-filter="root">成员</button>
                <button class="filter-btn" data-filter="tianbin">运营</button>
            </div>
            <div class="members-grid" id="team-members-container">
            </div>
        </div>
    </section>
    <section class="contact">
        <div class="container">
            <h2>联系我们</h2>
            <div class="contact-info">
                <div class="contact-item">
                    <i class="fas fa-envelope"></i>
                    <p>op@wentianplay.com</p>
                </div>
                <div class="contact-item">
                    <i class="fas fa-phone"></i>
                    <p>+86 173 0728 4633</p>
                </div>
                <div class="contact-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <p>WenTianPlay.com</p>
                </div>
            </div>
        </div>
    </section>
    <footer>
        <div class="container">
 <iframe src="https://link.wentianplays.com/?t=<%= new Date().getTime() %>" 
  width="100%" 
   height="128" 
    frameborder="0" 
    scrolling="auto"
   style="border-radius: 8px;"
  title="文天玩官方域名友链公示">
           </iframe>
        </div>
    </div>
    </footer>
    <script src="http://api.wentianplay.com/api/main.js"></script>
</body>
</html>
